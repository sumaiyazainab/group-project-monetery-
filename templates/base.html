<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Direct Evolution Monitoring{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
            color: #333;
        }

        header {
            background-color: #1f2933;
            color: white;
            padding: 1rem 2rem;
        }

        nav a {
            color: white;
            margin-right: 1.5rem;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 2rem;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background-color: #e5e7eb;
            margin-top: 3rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    © 2026 Direct Evolution Monitoring
</footer>

</body>
</html>
